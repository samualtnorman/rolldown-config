name: Test
on: { push: , pull_request: }

jobs:
  test:
    strategy: { matrix: { node-version: [ "22.12", ^22.12, "24.0", ^24, "25.0", ">=25" ] } }
    runs-on: ubuntu-latest

    steps:
    - { name: Checkout, uses: actions/checkout@v6 }
    - { name: Setup pnpm, uses: pnpm/action-setup@v6, with: { version: ^10, run_install: true } }

    - name: Setup Node.js ${{matrix.node-version}} environment
      uses: actions/setup-node@v6
      with: { node-version: "${{matrix.node-version}}", cache: pnpm }

    - run: scripts/jsr.sh
    - run: scripts/npm.sh
    - run: scripts/test.sh
    - run: git config --global user.email github-action@users.noreply.github.com
    - run: git config --global user.name "Github Action"
    - run: scripts/version-dev.js
